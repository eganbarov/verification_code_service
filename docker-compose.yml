version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    networks:
      - go-network
    depends_on:
      - redis
    environment:
      - LISTEN_PORT=8080
      - REDIS_HOST=redis:6379
      - REDIS_DB=0
      - REDIS_MAX_RETRIES=5
      - REDIS_DIAL_TIMEOUT=10
      - REDIS_TIMEOUT=5
      - CODE_TTL=300
      - REPEAT_SENT_CODE_TTL=60

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - go-network

networks:
  go-network:
    driver: bridge